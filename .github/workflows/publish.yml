name: Publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't actually publish)"
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Test (skip Postgres integration tests — no Docker in this runner)
        run: SKIP_INTEGRATION=true npm test

      - name: Publish (dry run)
        if: ${{ inputs.dry_run }}
        run: |
          for pkg in packages/mesh-*/; do
            echo "--- DRY RUN: $(basename $pkg) ---"
            cd "$pkg"
            npm publish --dry-run --access public 2>&1 | tail -5
            cd ../..
          done

      - name: Publish (real)
        if: ${{ !inputs.dry_run }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          cat ~/.npmrc | head -c 40
          echo "..."
          for pkg in packages/mesh-*/; do
            echo "--- Publishing: $(basename $pkg) ---"
            cd "$pkg"
            npm publish --access public 2>&1 | tail -8
            cd ../..
          done
